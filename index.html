<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIN Giriş Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 360px;
      text-align: center;
    }

    .icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #222;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 26px;
    }

    h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 2rem; }

    .digits {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .digits input {
      width: 56px;
      height: 60px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      background: #111;
      border: 1.5px solid #333;
      border-radius: 10px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .digits input:focus { border-color: #555; }

    #msg {
      min-height: 38px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 1.25rem;
      padding: 0 12px;
      transition: all 0.2s;
    }

    .msg-success { background: #0d2e1a; color: #4ade80; border: 1px solid #166534; }
    .msg-error   { background: #2e0d0d; color: #f87171; border: 1px solid #7f1d1d; }
    .msg-warn    { background: #2e1f0d; color: #fbbf24; border: 1px solid #78350f; }
    .msg-info    { background: #0d1f2e; color: #60a5fa; border: 1px solid #1e3a5f; }

    button {
      width: 100%;
      padding: 0.75rem;
      border-radius: 10px;
      border: 1px solid #333;
      background: #222;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 0.6rem;
    }

    button:hover { background: #2a2a2a; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-reset { font-size: 13px; color: #888; }

    .info-box {
      margin-top: 1.5rem;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }

    .info-label { font-size: 12px; color: #555; margin-bottom: 6px; }
    .pin-display { font-size: 28px; font-weight: 600; letter-spacing: 10px; color: #fff; }
    .btn-reveal { width: auto; padding: 4px 14px; font-size: 12px; margin-top: 10px; color: #888; }

    .attempts-box { margin-top: 1.25rem; }
    .attempts-label { font-size: 12px; color: #555; }
    .attempts-num { font-size: 26px; font-weight: 600; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>Güvenli Alan</h1>
    <p class="subtitle">4 haneli PIN kodunu girin</p>

    <div class="digits">
      <input id="d1" type="text" inputmode="numeric" maxlength="1" />
      <input id="d2" type="text" inputmode="numeric" maxlength="1" />
      <input id="d3" type="text" inputmode="numeric" maxlength="1" />
      <input id="d4" type="text" inputmode="numeric" maxlength="1" />
    </div>

    <div id="msg"></div>

    <button id="btnCheck" onclick="checkPin()">Doğrula</button>
    <button class="btn-reset" onclick="resetAll()">Sıfırla</button>

    <div class="info-box">
      <p class="info-label">Doğru PIN (test amaçlı)</p>
      <p class="pin-display" id="showPin">????</p>
      <button class="btn-reveal" onclick="revealPin()">PIN'i göster</button>
    </div>

    <div class="attempts-box">
      <p class="attempts-label">Deneme sayısı</p>
      <p class="attempts-num" id="attempts">0</p>
    </div>
  </div>

  <script>
    const CORRECT = String(Math.floor(Math.random() * 10000)).padStart(4, '0');
    let attempts = 0;
    let locked = false;
    const ids = ['d1','d2','d3','d4'];

    ids.forEach((id, i) => {
      const el = document.getElementById(id);
      el.addEventListener('input', () => {
        el.value = el.value.replace(/[^0-9]/g, '').slice(-1);
        if (el.value && i < 3) document.getElementById(ids[i+1]).focus();
      });
      el.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !el.value && i > 0) document.getElementById(ids[i-1]).focus();
        if (e.key === 'Enter') checkPin();
      });
    });

    function getPin() { return ids.map(id => document.getElementById(id).value).join(''); }

    function setMsg(text, type) {
      const el = document.getElementById('msg');
      el.className = 'msg-' + type;
      el.textContent = text;
    }

    function checkPin() {
      if (locked) { setMsg('Hesap kilitlendi! Sıfırla.', 'warn'); return; }
      const pin = getPin();
      if (pin.length < 4) { setMsg('4 hane giriniz', 'info'); return; }
      attempts++;
      document.getElementById('attempts').textContent = attempts;

      if (pin === CORRECT) {
        setMsg('✓ Doğru PIN! Giriş başarılı.', 'success');
        locked = true;
      } else {
        if (attempts >= 5) {
          setMsg('✗ Çok fazla deneme! Hesap kilitlendi.', 'warn');
          locked = true;
          ids.forEach(id => document.getElementById(id).disabled = true);
          document.getElementById('btnCheck').disabled = true;
        } else {
          setMsg(`✗ Yanlış PIN! (${5 - attempts} hakkın kaldı)`, 'error');
          ids.forEach(id => document.getElementById(id).value = '');
          document.getElementById('d1').focus();
        }
      }
    }

    function resetAll() {
      attempts = 0; locked = false;
      document.getElementById('attempts').textContent = '0';
      ids.forEach(id => {
        const el = document.getElementById(id);
        el.value = ''; el.disabled = false;
      });
      document.getElementById('btnCheck').disabled = false;
      document.getElementById('msg').textContent = '';
      document.getElementById('msg').className = '';
      document.getElementById('showPin').textContent = '????';
      document.getElementById('d1').focus();
    }

    function revealPin() { document.getElementById('showPin').textContent = CORRECT; }
  </script>
</body>
</html>
